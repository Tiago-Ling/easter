<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color" content="#e07baa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Easter Hunt 🥚</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  >

  <!-- App styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Layer 1: Fullscreen map -->
  <div id="map" aria-label="Crystal Palace Park map" role="application"></div>

  <!-- Layer 2: Fixed header with score -->
  <header id="app-header">
    <h1>🐣 Easter Hunt</h1>
    <div id="score-display" aria-live="polite" aria-atomic="true">
      <span id="score-value">0</span> pts
    </div>
  </header>

  <!-- Layer 3: Backdrop (dims map when sheet open) -->
  <div id="sheet-backdrop" aria-hidden="true"></div>

  <!-- Layer 4: Bottom sheet -->
  <div
    id="bottom-sheet"
    role="dialog"
    aria-label="Task list"
    aria-modal="true"
    aria-hidden="true"
  >
    <div id="sheet-handle-bar" aria-hidden="true"></div>

    <div id="sheet-header">
      <h2>Your Tasks</h2>
      <span id="task-progress" aria-live="polite">0 / 8 complete</span>
    </div>

    <div id="task-list" role="list" aria-label="Scavenger hunt tasks"></div>
  </div>

  <!-- Layer 5: FAB — egg button to open/close sheet -->
  <button
    id="fab"
    aria-label="Open task list"
    aria-expanded="false"
    aria-controls="bottom-sheet"
  >🥚</button>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <!-- App -->
  <script type="module" src="app.js"></script>

</body>
</html>
